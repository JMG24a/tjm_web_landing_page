<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tio Jaime Mueblería</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="icon" type="image/png" href="/image/logo_tjm.png">
    <link rel="stylesheet" href="/css/list.css">
    <link rel="stylesheet" href="/css/bar.css">
    <link rel="stylesheet" href="/css/slogan.css">
    <link rel="stylesheet" href="/css/welcome.css">
    <link rel="stylesheet" href="/css/modal_ws.css">
    <link rel="stylesheet" href="/css/modal.css">
    <link rel="stylesheet" href="/css/suggest.css">
    <link rel="stylesheet" href="/css/loader.css">
    <link rel="stylesheet" href="/css/tag_price.css">

  </head>
  <body>
    <a href="/" class="top-gradient-bar_products">
      <p class="logo_go_back" onclick="goToCategory('/')">
        <img width="25px" height="25px" src="/image/back_btn_white.png" alt="volver">
      </p>
    </a>

    <section class="welcome-slider">
      <div class="sliders">
        <!-- <picture>
          <source media="(max-width: 768px)" srcset="image/4_5_sofas_slider.jpg">
          <source media="(max-width: 1200px)" srcset="image/slider_sofas_d.png">
          <img src="image/slider_sofas_d.png" alt="Mueble premium">
        </picture> -->
      </div>
      <div class="slogan">
        <div class="slogan-line-deco"></div>
        <h1>
          <span class="slogan-main">Crea tu espacio</span>
          <span class="slogan-sub slogan-sub_white">Con los mejores muebles</span>
        </h1>
      </div>
    </section>

    <section class="furniture-section">
      <div class="furniture-grid"></div>
    </section>

    <div id="product-modal" class="modal hidden">
      <div class="modal-backdrop"></div>


      <div class="modal-content">
        <!-- <div class="top-gradient-bar_modal">
          <img class="logo-modal" src="/image/logo_tjm.png" alt="logo">
          <button class="modal-close">&times;</button>
        </div> -->

        <div class="modal-grid">
          <!-- Imagen -->
          <div class="modal-image">
            <img id="modal-img" class="img_modal" src="" alt="">
            <div class="top-gradient-bar_modal">
              <img class="logo-modal" src="/image/logo_tjm.png" alt="logo">
              <button class="modal-close">&times;</button>
            </div>
          </div>

          <!-- Info -->
          <aside class="modal-info">
            <div class="container-title">
              <h2 id="modal-name" class="modal-name"></h2>
              <a id="ws-modal" class="social">
                <img src="/image/whatsapp.png" alt="logo" width="24px">
              </a>
            </div>
            <p id="product-price" class="product-price displayNone"></p>
            <div class="modal-opens displayNone" id="modal-chairs"></div>
            <div class="modal-opens displayNone" id="modal-top"></div>
            <div class="modal-colors" id="modal-colors"></div>
            <div class="modal-opens displayNone" id="modal-open"></div>
            <div id="container_size" class="displayNone">
              <p class="size">
                <i>
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#434343">
                  <path d="M208-120q-37 0-62.5-25.5T120-208v-548q0-29 27-40.5t47 8.5l90 90-54 54 28 28 54-54 104 104-54 54 28 28 54-54 104 104-54 54 28 28 54-54 104 104-54 54 28 28 54-54 80 80q20 20 8.5 47T756-120H208Zm32-120h332L240-572v332Z"/>
                </svg>
              </i>
              </p><p id="size" class="size_text"></p>
            </div>
            <p id="modal-desc" class="clamp desc"></p>
            <span id="toggle" class="toggle_desc">Leer más</span>

            <h3 class="suggest-title">También te puede interesar</h3>
            <div class="suggest-grid" id="suggest">

            </div>
          </aside>
        </div>
      </div>
    </div>

    <div id="modal-container" class="modal-overlay">
      <div class="modal-content-ws">
        <div class="links-container">
            <a href="https://wa.me/04121506497" class="location-link">
              San Pablo Yaracuy <img src="/image/whatsapp.png" alt="logo" width="24px"></i>
            </a>
            <a href="https://wa.me/04120213946" class="location-link">
              Lara Barquisimeto <img src="/image/whatsapp.png" alt="logo" width="24px"></i>
            </a>
            <a href="https://wa.me/04120213946" class="location-link">
              Ciudad Ojeda Zulia <img src="/image/whatsapp.png" alt="logo" width="24px"></i>
            </a>
          </div>
          <button id="close-modal" class="close-btn">Cerrar</button>
        </div>
      </div>
    </div>

    <script src="/js/db.js"></script>
    <script src="/js/home.js"></script>
    <script src="/js/products.js"></script>
    <script src="/js/admin.js"></script>
    <!-- <script src="/js/router.js"></script> -->
  </body>
</html>
